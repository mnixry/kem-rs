name: Nix Flake Check
on:
  push:
jobs:
  check:
    strategy:
      matrix:
        runs-on: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@main
      - uses: ./.github/actions/setup-nix
      - run: nix flake check --print-build-logs
  coverage:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@main
      - uses: ./.github/actions/setup-nix
      - run: nix build '.#coverage' --print-build-logs
      - name: Extract coverage results
        run: |
          pipx run pycobertura show \
            --format markdown result/coverage.xml >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@main
        with:
          path: result
          name: coverage-results
  bench:
    strategy:
      matrix:
        runs-on: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.runs-on }}
    needs: check
    steps:
      - uses: actions/checkout@main
      - uses: ./.github/actions/setup-nix
      - run: nix build '.#benchmark' --print-build-logs
      - uses: actions/upload-artifact@main
        with:
          path: result
          name: benchmark-results-${{ matrix.runs-on }}
